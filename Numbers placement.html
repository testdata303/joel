<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOEL · Numbers placement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/joel-app.css">
<style>
  .scroll{flex:1;min-height:0;overflow:auto;}

  /* switcher + popover */
  .sw-wrap{position:relative;}
  .bizmenu{position:absolute;top:calc(100% + 7px);left:0;width:312px;background:#fff;border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow-pop);padding:9px;z-index:60;}
  .bm-head{display:flex;align-items:center;gap:11px;padding:7px 8px 11px;}
  .bm-tile{width:34px;height:34px;border-radius:9px;background:var(--blue);color:#fff;font-weight:800;font-size:.95rem;display:grid;place-items:center;flex-shrink:0;}
  .bm-head-tx b{font-weight:800;font-size:.95rem;color:var(--ink);display:block;letter-spacing:-.01em;}
  .bm-head-tx span{font-size:.76rem;color:var(--muted);}
  .bm-lbl{font-size:.64rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 8px 7px;}

  /* main number — the colorful highlight */
  .bm-main{background:linear-gradient(160deg,#eef1ff,#e7ecff);border:1px solid #dbe1fb;border-radius:12px;padding:12px 13px;margin-bottom:7px;}
  .bm-main-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .bm-tag{font-size:.62rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);}
  .bm-main-top .bm-copy{margin-left:auto;}
  .bm-num{font-size:1.18rem;font-weight:800;letter-spacing:-.01em;color:var(--ink);font-variant-numeric:tabular-nums;}
  .bm-sub{display:flex;align-items:center;gap:7px;font-size:.76rem;color:var(--body);margin-top:5px;}
  .bm-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .bm-dot.g{background:var(--green);box-shadow:0 0 0 3px var(--green-soft);}
  .bm-dot.a{background:var(--gold);box-shadow:0 0 0 3px var(--amber-soft);}
  .bm-dot.m{background:#c2c6cf;}

  /* other numbers */
  .bm-row{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:10px;}
  .bm-row:hover{background:var(--bg-alt);}
  .bm-ic{width:32px;height:32px;border-radius:8px;background:var(--bg-alt);color:var(--body);display:grid;place-items:center;flex-shrink:0;}
  .bm-ic svg{width:16px;height:16px;}
  .bm-rowtx{flex:1;min-width:0;}
  .bm-rowtx b{font-weight:700;font-size:.86rem;color:var(--ink);font-variant-numeric:tabular-nums;display:block;}
  .bm-rowtx span{font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:1px;}

  .bm-copy{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;color:var(--blue);background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 9px;flex-shrink:0;}
  .bm-copy:hover{border-color:var(--blue);}
  .bm-copy.done{color:var(--green);border-color:#cfe9db;background:var(--green-soft);}
  .bm-copy svg{width:13px;height:13px;}
  .bm-copy.icon{padding:6px;gap:0;}

  .bm-div{height:1px;background:var(--line-soft);margin:7px 4px;}
  .bm-foot{display:flex;flex-direction:column;}
  .bm-link{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:9px;font-size:.85rem;font-weight:600;color:var(--ink);text-align:left;}
  .bm-link:hover{background:var(--bg-alt);}
  .bm-link svg{width:16px;height:16px;color:var(--muted);}
  .bm-link .badge-amber{margin-left:auto;font-size:.62rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--amber);background:var(--amber-soft);border:1px solid #f3dca6;padding:2px 7px;border-radius:6px;}

  /* call flow header treatment (main area) */
  .cfhead{max-width:760px;margin:0 auto;padding:34px 30px;}
  .cfhead h1{font-size:1.8rem;font-weight:800;letter-spacing:-.03em;}
  .cfhead > p{color:var(--body);font-size:1rem;margin-top:6px;max-width:54ch;}
  .cfenter{margin-top:26px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-card);padding:18px 20px;}
  .cfenter-lbl{font-size:.7rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:8px;}
  .cfenter-lbl svg{width:14px;height:14px;}
  .cfnums{display:flex;flex-direction:column;gap:9px;}
  .cfnum{display:flex;align-items:center;gap:13px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;}
  .cfnum-ic{width:34px;height:34px;border-radius:9px;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;flex-shrink:0;}
  .cfnum-ic svg{width:17px;height:17px;}
  .cfnum-tx{flex:1;min-width:0;}
  .cfnum-tx b{font-weight:700;font-size:.95rem;color:var(--ink);font-variant-numeric:tabular-nums;}
  .cfnum-tx span{display:block;font-size:.78rem;color:var(--muted);}
  .cfnum-route{font-size:.78rem;color:var(--body);display:flex;align-items:center;gap:7px;flex-shrink:0;}
  .cfnum-route svg{width:14px;height:14px;color:var(--muted);}
  .cfnum-sms{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;padding:4px 9px;border-radius:7px;flex-shrink:0;}
  .cfnum-sms.on{color:#0f7a47;background:var(--green-soft);}
  .cfnum-sms.pend{color:var(--amber);background:var(--amber-soft);}
  .cfnum-sms.off{color:var(--muted);background:var(--bg-alt);}
  .cfflow-down{display:flex;justify-content:center;padding:14px 0 4px;color:var(--muted);}
  .cfflow-down svg{width:22px;height:22px;}
  .cfnote{display:flex;gap:10px;align-items:flex-start;max-width:760px;margin:18px auto 0;padding:0 30px;font-size:.84rem;color:var(--muted);line-height:1.55;}
  .cfnote svg{width:15px;height:15px;flex-shrink:0;margin-top:2px;color:var(--blue);}
  .cfnote b{color:var(--ink);font-weight:700;}
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail" data-bg-color="#2540ee">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#2540ee"/>
    <g transform="translate(600 360)" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-120 -60 h70 l24 60 -36 24 a150 150 0 0 0 84 84 l24 -36 60 24 v70 a30 30 0 0 1 -30 30 A270 270 0 0 1 -150 -30 a30 30 0 0 1 30 -30 z"/>
    </g>
    <text x="600" y="560" text-anchor="middle" font-family="Archivo Black, Arial Black, sans-serif" font-size="84" letter-spacing="3" fill="#ffffff">NUMBERS</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app/ui.jsx"></script>

<script type="text/babel">
const { Icon, Avatar } = window;
const { useState } = React;

function I({ name }){
  if(name==='copy') return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
  );
  if(name==='switch') return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M16 3l4 4-4 4"/><path d="M20 7H6"/><path d="M8 21l-4-4 4-4"/><path d="M4 17h14"/></svg>
  );
  return <Icon name={name}/>;
}

const NUMBERS = [
  { num:'(617) 555-0100', label:'Local', main:true,  sms:'on',   route:'Main flow' },
  { num:'(617) 555-0188', label:'Toll-free', sms:'pend', route:'Main flow' },
  { num:'(617) 555-0199', label:'Marketing tracking', sms:'off', route:'Ext. 3 Billing' },
];
const SMS = { on:{cls:'g',txt:'Texting on'}, pend:{cls:'a',txt:'Texting pending'}, off:{cls:'m',txt:'Calls only'} };

function Copy({ big }){
  const [done,setDone]=useState(false);
  const hit=()=>{ setDone(true); setTimeout(()=>setDone(false),1300); };
  if(big) return <button className={`bm-copy${done?' done':''}`} onClick={hit}><I name={done?'check':'copy'}/>{done?'Copied':'Copy'}</button>;
  return <button className={`bm-copy icon${done?' done':''}`} onClick={hit} title="Copy number"><I name={done?'check':'copy'}/></button>;
}

function BizMenu(){
  const main = NUMBERS.find(n=>n.main);
  const others = NUMBERS.filter(n=>!n.main);
  return (
    <div className="bizmenu">
      <div className="bm-head">
        <span className="bm-tile">S</span>
        <div className="bm-head-tx"><b>Smilebar</b><span>Pro plan · 3 numbers</span></div>
      </div>

      <div className="bm-lbl">Your numbers</div>
      <div className="bm-main">
        <div className="bm-main-top"><span className="bm-tag">Main number · {main.label}</span><Copy big/></div>
        <div className="bm-num">{main.num}</div>
        <div className="bm-sub"><span className={`bm-dot ${SMS[main.sms].cls}`}></span>{SMS[main.sms].txt} · Customers call this</div>
      </div>

      {others.map(n=>(
        <div className="bm-row" key={n.num}>
          <span className="bm-ic"><Icon name="phone"/></span>
          <div className="bm-rowtx"><b>{n.num}</b><span><span className={`bm-dot ${SMS[n.sms].cls}`}></span>{n.label} · {SMS[n.sms].txt}</span></div>
          <Copy/>
        </div>
      ))}

      <div className="bm-div"></div>
      <div className="bm-foot">
        <button className="bm-link"><Icon name="hashnum"/>Manage numbers{NUMBERS.some(n=>n.sms==='pend') && <span className="badge-amber">1 pending</span>}</button>
        <button className="bm-link"><Icon name="plus"/>Add a number</button>
        <button className="bm-link"><I name="switch"/>Switch business</button>
      </div>
    </div>
  );
}

const NAV = [
  { icon:'phone', label:'Calls & Voicemails', badge:3 },
  { icon:'message', label:'Texts' },
];
const SYS = [
  { icon:'route', label:'Call Flow', active:true },
  { icon:'layers', label:'Integrations' },
  { icon:'settings', label:'Settings' },
  { icon:'card', label:'Billing' },
];

function Shell(){
  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sb-top">
          <div className="sb-brand"><span className="sb-word">JOEL</span></div>
          <div className="sw-wrap">
            <button className="switcher" style={{borderColor:'#cdd2db',background:'var(--bg-alt)'}}>
              <span className="biz-tile">S</span>
              <span className="biz-name">Smilebar</span>
              <span className="chev"><Icon name="chevdown" style={{width:16,height:16}}/></span>
            </button>
            <BizMenu/>
          </div>
        </div>
        <nav className="sb-nav">
          {NAV.map(n=>(
            <button key={n.label} className="sb-item"><Icon name={n.icon}/>{n.label}{n.badge && <span className="badge">{n.badge}</span>}</button>
          ))}
          <div className="sb-group">System</div>
          {SYS.map(n=>(
            <button key={n.label} className={`sb-item${n.active?' active':''}`}><Icon name={n.icon}/>{n.label}</button>
          ))}
        </nav>
      </aside>
      <div className="main">
        <header className="topbar">
          <button className="search"><Icon name="search" style={{width:17,height:17}}/><input placeholder="Search calls, voicemails, messages…" readOnly/><span className="kbd">⌘K</span></button>
          <div className="top-actions">
            <button className="icon-btn"><Icon name="bell" style={{width:19,height:19}}/><span className="dot"/></button>
            <button className="acct"><Avatar name="Bob Stevens"/><span className="acct-who"><b>Bob Stevens</b><span>Owner</span></span><Icon name="chevdown" style={{width:15,height:15,color:'var(--muted)'}}/></button>
          </div>
        </header>
        <div className="scroll">
          <div className="cfhead">
            <h1>Call flow</h1>
            <p>Everything that happens when someone calls Smilebar. It starts with the numbers customers dial.</p>
            <div className="cfenter">
              <div className="cfenter-lbl"><Icon name="phone"/>Calls come in on</div>
              <div className="cfnums">
                {NUMBERS.map(n=>{ const s=SMS[n.sms]; return (
                  <div className="cfnum" key={n.num}>
                    <span className="cfnum-ic"><Icon name="phone"/></span>
                    <div className="cfnum-tx"><b>{n.num}</b><span>{n.label}</span></div>
                    <span className="cfnum-route"><Icon name="route"/>{n.route}</span>
                    <span className={`cfnum-sms ${n.sms==='on'?'on':n.sms==='pend'?'pend':'off'}`}>{s.txt}</span>
                  </div>
                ); })}
              </div>
            </div>
            <div className="cfflow-down"><Icon name="chevdown"/></div>
          </div>
          <div className="cfnote"><Icon name="info"/><span><b>Two homes for one fact.</b> The number lives where you’d ask for it: a glance inside the Smilebar menu (left), and as the entry point of the flow here. No permanent box cluttering the rail — and it scales to all three lines.</span></div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Shell/>);
</script>
</body>
</html>
